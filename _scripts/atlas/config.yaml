# Rubicon Atlas automation config

atlas:
  base_url: "https://watersprings.rubiconatlas.org/"
  course: "Bible 9 Foundations"
  # Unit editor pattern: /develop/unit-planner/<unit_id>
  unit_planner_path: "develop/unit-planner"
  unit_ids:            # Atlas internal unit ids (all 18 created)
    "01": 2224
    "02": 2225
    "03": 2226
    "04": 2227
    "05": 2228
    "06": 2229
    "07": 2230
    "08": 2231
    "09": 2232
    "10": 2233
    "11": 2234
    "12": 2235
    "13": 2236
    "14": 2237
    "15": 2238
    "16": 2239
    "17": 2240
    "18": 2241

# The 5 content fields per unit come from these markdown files (the data model).
# The driver parses each file's "## N · Field" sections.
data_model:
  dir: "classes/foundations/rubicon-atlas"
  file_glob: "unit-*.md"

# Unit -> target dates (our 2026-27 teaching map). See classes/foundations/teaching-map.md.
# NOTE: Atlas does not expose 2026-27 week dates until AFTER Aug 1, 2026. Until then,
# units get placeholder 2025 dates; date-setting must be (re)run after Aug 1, 2026.
academic_year: "2026-27"
unit_dates:
  "01": { start: "2026-08-24", end: "2026-09-02" }
  "02": { start: "2026-09-03", end: "2026-09-16" }
  "03": { start: "2026-09-17", end: "2026-09-29" }
  "04": { start: "2026-09-30", end: "2026-10-13" }
  "05": { start: "2026-10-14", end: "2026-10-27" }
  "06": { start: "2026-10-28", end: "2026-11-10" }
  "07": { start: "2026-11-13", end: "2026-12-01" }
  "08": { start: "2026-12-02", end: "2026-12-11" }
  "09": { start: "2027-01-05", end: "2027-01-14" }
  "10": { start: "2027-01-19", end: "2027-01-28" }
  "11": { start: "2027-02-01", end: "2027-02-10" }
  "12": { start: "2027-02-11", end: "2027-02-25" }
  "13": { start: "2027-03-01", end: "2027-03-09" }
