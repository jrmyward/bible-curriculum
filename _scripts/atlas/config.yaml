# ---------------------------------------------------------------------------
# Additional courses (multi-course reference).
# The action scripts don't read this file: fill_unit.py fills whatever unit page
# the browser is on, lesson_fill.py takes <unit_id> as an arg, and create_unit.py
# takes `--course <course_map_id>` (or `--anchor <unit_id>`). This block just records
# each course's ids/dates for humans. The top-level keys above are Foundations.
# ---------------------------------------------------------------------------
apologetics:
  course: "Apologetics"                 # Summit Understanding the Times, Book II (grades 10-11)
  course_map_id: 190                    # /develop/course-map/190/unit-calendar/year
  data_model_dir: "classes/apologetics/rubicon-atlas"
  # create with: create_unit.py <unit-NN-*.md> --course 190   (first unit) then --anchor <new id>
  unit_ids:                             # fill in as units are created (create_unit.py prints each id)
    "01": 2242
  academic_year: "2026-27"
  unit_dates:                           # from classes/apologetics/teaching-map.md (same calendar as Foundations)
